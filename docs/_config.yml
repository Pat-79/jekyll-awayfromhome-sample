# ── Site identity ──────────────────────────────────────────────────────────────
title: Away From Home Sample
description: your getaway at home sample page
url: "https://demo.awayfromhome.nl"
permalink: /blog/:year-:month-:day_:title/
email: noreply@awayfromhome.nl

# ── Remote theme ───────────────────────────────────────────────────────────────
remote_theme: Pat-79/jekyll-awayfromhome
plugins:
  - jekyll-remote-theme
  - jekyll-feed

# ── Brand ──────────────────────────────────────────────────────────────────────
brand:
  title: awayfromhome sample
  logo: /assets/images/logo-mark.svg


navigation:
  - title: Home
    key: home
    url: /
  - title: About
    key: about
    url: /about/
  - title: Blogs
    key: blog
    url: /blog/
  - title: Browse
    key: browse
    url: /browse/
  - title: Search
    key: search
    url: /search/

# ── Social links ───────────────────────────────────────────────────────────────
social_links:
  - platform: youtube
    url: https://www.youtube.com/@-Away-From-Home-
  - platform: instagram
    url: https://www.instagram.com/awayfromhome_nl/
  - platform: github
    url: https://github.com/Pat-79/jekyll-awayfromhome

# ── Home landing hero ──────────────────────────────────────────────────────────
default_post_image: /assets/images/default-hero.svg

home_landing:
  #video_url: https://youtu.be/VIDEO_ID
  #youtube_id:
  image: /assets/images/default-hero.svg
  #latest_posts_limit: 10
  #hls_url: /assets/streams/sample_stream.m3u8
  #hls_url: https://pat-79.github.io/assets/streams/sample/sample_stream.m3u8
  hls_url: /assets/streams/sample/sample_stream.m3u8

# ── Widgets ───────────────────────────────────────────────────────────────────
map_widget:
  tile_url: https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}
  #tile_url: https://{s}.openstreetmap.org/{z}/{x}/{y}.png
  tile_attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  tile_subdomains:
  tile_max_zoom: 19
  locked: true
  scroll_wheel_zoom: false
  dragging:
  touch_zoom:
  double_click_zoom:
  box_zoom:
  keyboard:
  tile_referrer_policy: strict-origin-when-cross-origin
  tile_cross_origin:
  max_width:
  max_height:

video_widget:
  width:
  height:
  max_width:
  max_height:
  aspect_ratio: 16:9
  bare: false
  autoplay: false
  muted: false
  loop: false
  controls: true
  playsinline: true
  preload: metadata
  lazy: true
  privacy_mode: true
  referrer_policy: strict-origin-when-cross-origin
  poster: /assets/images/default-hero.svg

gallery_widget:
  max_width:
  max_height:
  show_image_caption: false
  show_image_description: false

# ── Sidebar ───────────────────────────────────────────────────────────────────
sidebar:
  archive:
    enabled: true
    # Supported: 'year' | 'month-year' | 'year-month-tree'
    # mode: month-year
    mode: year-month-tree
    show_post_counts: true

# ── Multilingual settings ─────────────────────────────────────────────────────
# Multilingual settings
lang: en   # default site language

# When true, post/page listings on non-default-language pages will include
# default-language posts that have no translation in the current language
# (identified by a missing `ref` partner). Useful as a graceful fallback
# so non-English pages don't appear empty while content is being translated.
lang_fallback: true

# Languages available on this site.
# 'code' must match the lang front-matter value and the folder name under ar/, fr/, etc.
# 'native' is shown in the language selector UI.
languages:
  - code: en
    name: English
    native: English
    flag: "🇬🇧"
  - code: de
    name: German
    native: Deutsch
    flag: "🇩🇪"
  - code: nl
    name: Dutch
    native: Nederlands
    flag: "🇳🇱"
  - code: ar
    name: Arabic
    native: العربية
    flag: "🇸🇦"

# Defaults: give every file a lang and give posts their permalink prefix.
# Order matters — later entries override earlier ones for the same file.
defaults:
  - scope: { path: "", type: "posts" }
    values:
      lang: en
      #permalink: "/blog/:year-:month-:day_:title/"
      permalink: "/:slug/"
  - scope: { path: "" }
    values:
      lang: en
  - scope: { path: "theme/ar" }
    values:
      lang: ar
  - scope: { path: "_posts/ar", type: "posts" }
    values:
      lang: ar
      #permalink: "/ar/blog/:year-:month-:day_:title/"
      permalink: "/ar/:slug/"
  - scope: { path: "theme/nl" }
    values:
      lang: nl
  - scope: { path: "_posts/nl", type: "posts" }
    values:
      lang: nl
      #permalink: "/nl/blog/:year-:month-:day_:title/"
      permalink: "/nl/:slug/"
  - scope: { path: "theme/de" }
    values:
      lang: de
  - scope: { path: "_posts/de", type: "posts" }
    values:
      lang: de
      #permalink: "/de/blog/:year-:month-:day_:title/"
      permalink: "/de/:slug/"

# ── Feed settings ─────────────────────────────────────────────────────────────
feed:
  posts_limit: 50